<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学习材料预实验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#e8ecf1;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;}
#app{width:100%;max-width:1100px;height:98vh;max-height:none;background:#fff;border-radius:16px;box-shadow:0 0 40px rgba(0,0,0,0.06);overflow:hidden;display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}
.scroll-screen{overflow-y:auto;padding:28px 24px 80px;align-items:center;}
.card{width:100%;max-width:620px;background:#fff;border-radius:14px;padding:32px 28px;box-shadow:0 1px 12px rgba(0,0,0,0.03);margin:0 auto;}
.card h2{font-size:1.35rem;color:#1e293b;margin-bottom:6px;text-align:center;}
.card .sub{font-size:0.92rem;color:#64748b;margin-bottom:20px;text-align:center;line-height:1.6;}
.btn{padding:12px 30px;border:none;border-radius:22px;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:1px;font-family:inherit;}
.btn-p{background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,0.12);}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,0.22);}
.btn-p:disabled{background:#c7d2fe;cursor:not-allowed;transform:none;box-shadow:none;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:0.85rem;color:#334155;margin-bottom:5px;font-weight:500;}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.88rem;outline:none;background:#f8fafc;font-family:inherit;transition:border 0.2s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#6366f1;background:#fff;}
.q-row{margin-bottom:16px;}
.q-lbl{font-size:0.95rem;color:#1e293b;margin-bottom:8px;font-weight:500;line-height:1.5;}
.scale-r{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.scale-dot{width:36px;height:36px;border-radius:50%;border:1.5px solid #e2e8f0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.8rem;color:#64748b;background:#fafbfc;transition:all 0.15s;flex-shrink:0;}
.scale-dot:hover{border-color:#93c5fd;background:#eff6ff;}
.scale-dot.pick{background:#6366f1;color:#fff;border-color:#6366f1;}
.submit-zone{text-align:center;margin-top:24px;}
.err-msg{color:#ef4444;font-size:0.8rem;margin-top:6px;display:none;text-align:center;}
.chat-screen{background:#f8fafc;}
.chat-header{padding:12px 16px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-header .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.9rem;font-weight:600;}
.chat-header .name{font-weight:600;color:#1e293b;font-size:0.92rem;}
.chapter-tag{text-align:center;padding:6px 0;flex-shrink:0;font-size:0.78rem;color:#94a3b8;background:#f1f5f9;border-bottom:1px solid #e2e8f0;}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;}
.msg{display:flex;gap:8px;animation:fadeUp 0.35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.msg.ai{justify-content:flex-start;}
.msg .msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:600;}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;}
.msg .bubble{max-width:80%;padding:12px 16px;border-radius:14px;font-size:1rem;line-height:1.7;word-break:break-word;}
.msg.ai .bubble{background:#fff;color:#334155;border:1px solid #e2e8f0;border-top-left-radius:4px;}
.quiz-box{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;padding:14px;margin-top:4px;}
.quiz-box .q-text{font-weight:600;color:#1e293b;margin-bottom:10px;font-size:0.95rem;}
.quiz-box .q-opt,.q-opt{display:block;width:100%;text-align:left;padding:10px 14px;margin-bottom:5px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:0.92rem;color:#334155;transition:all 0.15s;font-family:inherit;}
.quiz-box .q-opt:hover,.q-opt:hover{border-color:#6366f1;background:#eef2ff;}
.q-opt.chosen,.quiz-box .q-opt.chosen{background:#6366f1;color:#fff;border-color:#6366f1;font-weight:500;}
.quiz-box .q-opt:disabled{cursor:default;}
.quiz-box .q-opt.correct-ans{border-color:#22c55e;background:#f0fdf4;}
.quiz-box .q-opt.wrong-ans{border-color:#ef4444;background:#fef2f2;}
.quiz-box .q-submit{margin-top:8px;padding:8px 22px;background:#6366f1;color:#fff;border:none;border-radius:18px;cursor:pointer;font-size:0.85rem;font-weight:500;font-family:inherit;}
.quiz-fb{margin-top:8px;padding:10px 12px;border-radius:8px;font-size:0.85rem;line-height:1.5;display:none;}
.quiz-fb.show{display:block;}
.quiz-fb.correct{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
.quiz-fb.incorrect{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
.prog-bar{height:3px;background:#e2e8f0;flex-shrink:0;}
.prog-bar .fill{height:100%;background:linear-gradient(90deg,#6366f1,#3b82f6);transition:width 0.4s;}
.cont-bar{padding:10px 16px;background:#fff;border-top:1px solid #e2e8f0;display:flex;justify-content:center;flex-shrink:0;}
.cont-btn{padding:12px 40px;border:none;border-radius:20px;background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;cursor:pointer;font-size:1rem;font-weight:600;transition:all 0.2s;letter-spacing:2px;font-family:inherit;}
.cont-btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(99,102,241,0.25);}
.cont-btn:active{transform:scale(0.96);}
.typing-indicator{display:flex;gap:4px;padding:12px 16px;align-items:center;}
.typing-indicator span{width:8px;height:8px;border-radius:50%;background:#94a3b8;animation:dotBounce 1.4s infinite both;}
.typing-indicator span:nth-child(1){animation-delay:0s;}
.typing-indicator span:nth-child(2){animation-delay:0.2s;}
.typing-indicator span:nth-child(3){animation-delay:0.4s;}
@keyframes dotBounce{0%,80%,100%{opacity:0.2;transform:translateY(0);}40%{opacity:1;transform:translateY(-5px);}}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:100;display:flex;align-items:center;justify-content:center;}
.overlay .card{max-height:85vh;overflow-y:auto;}
.end-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px;text-align:center;gap:12px;}
.end-page h2{font-size:1.4rem;color:#1e293b;}
@media(max-width:780px){#app{max-width:100%;border-radius:0;height:100vh;max-height:none;}.msg .bubble{max-width:88%;}}
</style>
</head>

<div id="app"></div>
<script>
// ============================================================

const CLOUD_KNOW=[{"text": "在大气科学中，云根据其形态特征和出现高度被分为不同的类型。最常见的分类系统将云分为十个基本属。下图展示了云按高度的基本分层。", "picture": "cloud_layers"}, {"text": "积云（Cumulus）是最常见的低云类型，外形像一团团棉花糖，底部平坦、顶部呈圆拱状隆起。图中是其典型形态。积云通常出现在晴朗天气，由地面受热后上升的暖湿气流在高空冷却凝结而成。积云一般不带来降水，但如果持续发展可能转变为积雨云。", "picture": "cumulus"}, {"text": "层云（Stratus）呈均匀的灰色或白色层状，像一层薄纱覆盖天空，通常出现在低空。层云常常带来毛毛雨或小雪，但降水量通常不大。当层云接地时，就会形成我们熟悉的雾。", "picture": ""}, {"text": "卷云（Cirrus）是典型的高云，出现在6000米以上的高空，由冰晶组成，呈细丝状、羽毛状或钩状。卷云通常预示着晴好天气的结束——当卷云逐渐增厚并下延为卷层云和高层云时，往往意味着暖锋即将到来。", "picture": ""}, {"text": "积雨云（Cumulonimbus）是垂直发展最旺盛的云，可以从低空一直延伸到万米以上的高空。图中可见其标志性的砧状顶部。积雨云是雷暴、暴雨、冰雹甚至龙卷风的「生产者」。", "picture": "cumulonimbus"}, {"text": "在中等高度（约2000-6000米），常见两种云：高层云（Altostratus）呈灰白或蓝灰色层状，可以透过它看到模糊的太阳轮廓；高积云（Altocumulus）则呈白色或灰色的小块或薄片排列，常形成「鱼鳞天」的景象。", "picture": ""}, {"text": "卷积云（Cirrocumulus）出现在高空中，由非常小的白色薄片或颗粒组成，排列成涟漪状，也被称为「鲭鱼天」。卷积云的出现相对少见，通常意味着大气层结不稳定。", "picture": ""}, {"text": "雨层云（Nimbostratus）是典型的降水云，呈暗灰色、厚而均匀的层状覆盖全天。与层云不同，雨层云通常带来持续性、中等强度的降水。", "picture": ""}, {"text": "上述八种云的区分主要基于三个维度：云底离地面的高度（低/中/高）、云的形态（层状/积状/卷状）以及是否正在产生降水。每一种云在这三个维度上的特征组合是唯一的。", "picture": ""}, {"text": "总结一下识别云的方法：首先判断云底高度属于低空、中空还是高空；其次观察云的形态是均匀层状、团块状还是纤维状；最后看是否正在降水。三个步骤依次判断，就能准确识别出具体的云类型。", "picture": ""}];
const THUNDER_KNOW=[{"text": "雷暴（Thunderstorm）是大气中最剧烈的天气现象之一，涉及从地面受热到闪电放电的完整因果链条。下图展示了这条因果链的全貌。理解雷暴的形成，需要同时追踪多个相互关联的大气过程。", "picture": "thunderstorm_chain"}, {"text": "第一步：太阳辐射加热。白天地表吸收太阳短波辐射后温度升高——这是整个雷暴形成链条的能量来源。太阳辐射越强，地表升温越快。", "picture": ""}, {"text": "第二步：近地面空气升温膨胀。地表温度上升后，通过传导和对流将热量传递给上方空气层。空气受热后体积膨胀、密度降低——这为后续的上升运动准备了条件。", "picture": ""}, {"text": "第三步：上升气流形成。受热膨胀的低密度空气产生了正浮力——密度低于周围环境空气的气块会在浮力作用下开始上升。这一步需要理解密度差是浮力的直接原因，而密度差又由地表加热的不均匀分布导致。", "picture": ""}, {"text": "第四步：水汽凝结释放潜热。随着气块上升到一定高度，环境温度降至露点温度，水蒸气开始凝结为液态水滴。凝结过程释放潜热——每克水汽凝结释放约2260焦耳的热量——这些热量反过来加热周围空气，增强上升气流。这是一个正反馈：上升→凝结→放热→更强的上升。", "picture": ""}, {"text": "第五步：云内电荷分离。在强烈的上升气流中，云滴和冰晶之间发生频繁碰撞。下图示意了电荷分离的过程。较轻的冰晶携带正电荷被上升气流带到云顶，较重的软雹携带负电荷沉降到云的中下部。这一过程需要同时理解碰撞机制、粒子分选和上升气流的驱动作用。", "picture": "charge_separation"}, {"text": "第六步：电场累积。随着正负电荷分别在云顶和云底累积，云内和云地之间形成了强大的电场。当电场强度超过空气的击穿阈值（约每米300万伏特），空气的绝缘性被破坏，形成导电通道。", "picture": ""}, {"text": "第七步：闪电放电。导电通道一旦形成，负电荷沿通道快速流向地面（云地闪电）或流向云内正电荷区域（云内闪电），形成巨大的电流脉冲。闪电通道内的空气被瞬间加热到约30000摄氏度——比太阳表面还要热五倍——导致周围空气爆炸性膨胀。", "picture": "lightning_discharge"}, {"text": "第八步：雷声传播。闪电通道周围空气的爆炸性膨胀产生冲击波，向外传播形成声波——这就是雷声。由于声速（约340米/秒）远小于光速（30万公里/秒），我们总是先看到闪电后听到雷声。", "picture": ""}, {"text": "第九步：强下沉气流与地面风。雷暴成熟后，降水拖曳周围空气向下运动，结合高空冷空气的下沉，形成强烈的下沉气流（下击暴流）。下击暴流撞击地面后向四周扩散，产生雷暴大风——风速可超过100公里/小时。", "picture": ""}, {"text": "综合来看，雷暴的形成需要理解十个环节之间的因果传递：太阳辐射→地表升温→空气受热膨胀→上升气流→凝结放热（正反馈强化上升）→电荷碰撞分离→电场累积→空气击穿→闪电放电→雷声与下沉气流。任何一个环节的理解都依赖对前序环节因果机制的记忆。", "picture": ""}];
const MC_CLOUD={"question": "刚才介绍的几种低云中，哪种云的顶部呈圆拱状隆起、底部平坦，通常出现在晴朗天气？", "choices": ["层云", "积云", "雨层云", "卷积云"], "correct": ["B"], "explanation": "正确答案是积云。积云外形像棉花糖，底部平坦、顶部圆拱状，由上升暖湿气流冷却凝结而成。"};
const MC_THUNDER={"question": "雷暴形成的整个因果链条中，最初的驱动力是什么？", "choices": ["闪电放电", "太阳辐射加热地表", "云内电荷分离", "上升气流"], "correct": ["B"], "explanation": "正确答案是太阳辐射加热地表。太阳辐射是整个雷暴形成链条的能量来源。"};

function buildSteps(topic){
    const know=topic==="cloud"?CLOUD_KNOW:THUNDER_KNOW;
    const sl=SLOTS[topic];
    const mc=topic==="cloud"?MC_CLOUD:MC_THUNDER;
    const st=[];
    st.push({type:"slot",content:sl[0]});
    const cut=Math.floor(know.length/3);
    for(let i=0;i<cut;i++)st.push({type:"knowledge",content:know[i].text,picture:know[i].picture||""});
    st.push({type:"quiz",q:mc.question,choices:mc.choices,correct:mc.correct,explanation:mc.explanation,fbIntro:""});
    st.push({type:"slot",content:sl[1]});
    for(let i=cut;i<Math.floor(know.length*2/3);i++)st.push({type:"knowledge",content:know[i].text,picture:know[i].picture||""});
    st.push({type:"slot",content:sl[2]});
    for(let i=Math.floor(know.length*2/3);i<know.length;i++)st.push({type:"knowledge",content:know[i].text,picture:know[i].picture||""});
    st.push({type:"slot",content:sl[3]});
    // 综合单选（从10道保留测验中抽1道作为课堂练习）
    const retAll=topic==="cloud"?RET_CLOUD:RET_THUNDER;
    const pq=retAll[4]; // 取第5道
    st.push({type:"quiz",q:pq.q,choices:pq.opts,correct:[pq.ans],explanation:"",fbIntro:sl[4]});
    st.push({type:"slot",content:sl[5]});
    return st;
}

function selPostOpt(el){
    const box=el.closest(".quiz-box")||el.closest(".q-row");
    if(box)box.querySelectorAll(".q-opt.chosen").forEach(o=>o.classList.remove("chosen"));

async function subQuiz(btn){
    const box=btn.closest(".quiz-box");const chosen=box.querySelector(".q-opt.chosen");
    if(S.quizLocked||!chosen)return;S.quizLocked=true;
    const step=S.steps.filter(s=>s.type==="quiz")[0];
    const sel=chosen.dataset.l;const isCorrect=step.correct.includes(sel);
    box.querySelectorAll(".q-opt").forEach(o=>{o.disabled=true;if(step.correct.includes(o.dataset.l))o.classList.add("correct-ans");if(o.dataset.l===sel&&!isCorrect)o.classList.add("wrong-ans");});
    btn.style.display="none";
    if(!isCorrect){await addMsg(step.fbIntro);}
    const fb=box.querySelector(".quiz-fb");fb.className="quiz-fb show "+(isCorrect?"correct":"incorrect");
    fb.innerHTML=`<strong>${isCorrect?FB.correct:FB.incorrect}</strong>${step.explanation?"<br><br>"+esc(step.explanation):""}`;
    S.quizDone=true;document.getElementById("msgs").scrollTop=document.getElementById("msgs").scrollHeight;
    showCont();
}

function addQuiz(step){
    const msgs=document.getElementById("msgs");if(!msgs)return;
    let optH=`<div style="font-size:0.78rem;color:#94a3b8;margin-bottom:8px;">（请选择一个选项）</div>`;
    optH+=step.choices.map((c,i)=>{const l=String.fromCharCode(65+i);return`<button class="q-opt" data-l="${l}" onclick="selPostOpt(this)">${l}. ${esc(c)}</button>`;}).join("");
    const div=document.createElement("div");div.className="msg ai";
    div.innerHTML=`<div class="msg-avatar">AI</div><div class="bubble"><div class="quiz-box"><div class="q-text">${esc(step.q||step.question)}</div>${optH}<button class="q-submit" onclick="subQuiz(this)">确认提交</button><div class="quiz-fb"></div></div></div>`;
    msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;
}

        {id:"pe3",text:"此刻我感到活跃",cat:"posemo"},
        {id:"pe4",text:"此刻我感到感兴趣",cat:"posemo"},
        {id:"si1",text:"刚才这一章中，AI助手呈现内容的方式吸引了我的注意力",cat:"sit_interest"},
        {id:"si2",text:"刚才这一章的学习内容让我感到新奇有趣",cat:"sit_interest"},
        {id:"si3",text:"我对这一章涉及的话题产生了好奇心",cat:"sit_interest"},
        {id:"si4",text:"这一章的内容让我感到兴奋，想要了解更多",cat:"sit_interest"},
        {id:"diff",text:"刚才这一章的学习内容对我来说有难度",cat:"difficulty"},
    ];
    // 仅在第一个主题后插入注意力检测
    if(S.topicIdx===0){
        items.splice(12,0,{id:"attn",text:"本题为注意力检测题，请选择「比较符合」",cat:"attention"});
    }

    const overlay=document.createElement("div");overlay.className="overlay";
    let h=`<div class="card"><h2>章节反馈</h2><div class="sub">请根据你刚才<strong>${tname}</strong>学习中的真实感受作答。<br>除特别标注外，量表均为1=完全不符合，5=非常符合</div>`;
    items.forEach(it=>{
        const is010=it.scale==="010";const maxV=is010?10:5;const minV=is010?0:1;
        h+=`<div class="q-row"><div class="q-lbl">${esc(it.text)}${is010?" <span style='font-size:0.75rem;color:#94a3b8;'>(0=完全不符合，10=完全符合)</span>":""}</div><div class="scale-r" style="gap:${is010?"1px":"6px"};">`;
        for(let v=minV;v<=maxV;v++)h+=`<div class="scale-dot" style="width:${is010?"27px":"36px"};height:${is010?"27px":"36px"};font-size:${is010?"0.68rem":"0.8rem"};" data-id="${it.id}" data-v="${v}" data-cat="${it.cat}" onclick="pickDot(this)">${v}</div>`;
        h+=`</div></div>`;
    });
    h+=`<div class="submit-zone"><button class="btn btn-p" id="ch-submit">继续</button><div class="err-msg" id="ch-err">请完成所有题目</div></div></div>`;
    overlay.innerHTML=h;document.body.appendChild(overlay);

    document.getElementById("ch-submit").onclick=()=>{
        const ans=[];let allDone=true;
        for(const it of items){const d=document.querySelector(`.scale-dot.pick[data-id="${it.id}"]`);if(!d){allDone=false;break;}ans.push({id:it.id,value:d.dataset.v,category:it.cat});}
        if(!allDone){document.getElementById("ch-err").style.display="block";return;}
        S.chForms[topic]=ans;S.chForms[topic+"_duration"]=Date.now()-S.chapterStart;
        document.body.removeChild(overlay);
        // 进入本节保持测验
        S.currentRetTopic=topic;
        nav("post_ret");
    };
}

// ============================================================
// 保持测验（10道单选，每主题学完后立即测）
// ============================================================
function post_ret(){
    const topic=S.currentRetTopic||ORDER[S.topicIdx-1];
    const ret=topic==="cloud"?RET_CLOUD:RET_THUNDER;
    const tname=TOPIC_NAMES[topic];
    let h=`<div class="screen active scroll-screen"><div class="card"><h2>${tname} · 知识测验</h2><div class="sub">请根据刚才的学习内容作答。每题只有一个正确答案。</div>`;
    ret.forEach((q,i)=>{
        h+=`<div class="q-row"><div class="q-lbl">${i+1}. ${esc(q.q)}</div>`;
        q.opts.forEach((o,j)=>{const l=String.fromCharCode(65+j);
            h+=`<button class="q-opt" data-q="${i+1}" data-v="${l}" onclick="selPostOpt(this)">${l}. ${esc(o)}</button>`;
        });
    });
    h+=`<div class="submit-zone"><button class="btn btn-p" id="btn-ret">下一步</button><div class="err-msg" id="err-ret">请完成所有题目</div></div></div></div>`;
    A.innerHTML=h;
    document.getElementById("btn-ret").onclick=()=>{
        const answers=[];let allDone=true;
        for(let i=0;i<ret.length;i++){
            const chosen=document.querySelector(`.q-opt.chosen[data-q="${i+1}"]`);
            if(!chosen){allDone=false;break;}
            const isCorrect=chosen.dataset.v===ret[i].ans;
            answers.push({q:i+1,chosen:chosen.dataset.v,correct:ret[i].ans,isCorrect});
        }
        if(!allDone){document.getElementById("err-ret").style.display="block";return;}
        S.retAnswers[topic]=answers;
        S.currentRetTopic=topic;
        nav("post_trans");
    };
}

// ============================================================
// 迁移测验（3道开放题，每主题学完后立即测）
// ============================================================
function post_trans(){
    const topic=S.currentRetTopic;
    const trans=topic==="cloud"?TRANS_CLOUD:TRANS_THUNDER;
    const tname=TOPIC_NAMES[topic];
    let h=`<div class="screen active scroll-screen"><div class="card"><h2>${tname} · 应用测验</h2><div class="sub">请根据所学知识回答以下应用题。</div>`;
    trans.forEach((q,i)=>{
        h+=`<div class="q-row"><div class="q-lbl">${i+1}. ${esc(q.text)}</div>`;
        h+=`<textarea id="tf-${i+1}" rows="4" style="width:100%;padding:10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.88rem;resize:vertical;font-family:inherit;" placeholder="请在此输入你的回答..."></textarea></div>`;
    });
    h+=`<div class="submit-zone"><button class="btn btn-p" id="btn-trans">下一步</button><div class="err-msg" id="err-trans">请完成所有题目</div></div></div></div>`;
    A.innerHTML=h;
    document.getElementById("btn-trans").onclick=()=>{
        const answers=[];let allDone=true;
        for(let i=0;i<trans.length;i++){const v=document.getElementById("tf-"+(i+1)).value.trim();if(!v){allDone=false;break;}answers.push({q:i+1,text:v});}
        if(!allDone){document.getElementById("err-trans").style.display="block";return;}
        S.transAnswers[topic]=answers;
        // 判断是否两个主题都完成了
        S.topicIdx++;
        if(S.topicIdx>=2){nav("post_eaas");}else{nav("lesson");}
    };
}

// ============================================================
// 后测：EAAS + 认知负荷
// ============================================================

    const eaasItems=[
        {id:1,dim:"sociability",text:"这个AI学习助手让我感到亲切"},{id:2,dim:"sociability",text:"这个AI学习助手像是一个友善的伙伴"},{id:3,dim:"sociability",text:"与这个学习助手交流让我感到自在"},{id:4,dim:"sociability",text:"这个AI学习助手能理解我的感受"},{id:5,dim:"sociability",text:"这个AI学习助手给人以温暖的感觉"},
        {id:6,dim:"agency",text:"这个AI学习助手的逻辑推理很清晰"},{id:7,dim:"agency",text:"这个AI学习助手展现出很强的专业能力"},{id:8,dim:"agency",text:"这个AI学习助手能主动引导我思考"},{id:9,dim:"agency",text:"这个AI学习助手似乎有自己的目标和意图"},{id:10,dim:"agency",text:"这个AI学习助手能自主地组织学习内容"},

        {id:"cl1",text:"这次学习活动所涉及的主题内容对我来说非常复杂",dim:"intrinsic"},{id:"cl2",text:"这次学习活动所涉及的核心概念对我来说非常难以理解",dim:"intrinsic"},{id:"cl3",text:"这次学习活动所涉及的知识点的定义与说明对我来说非常复杂",dim:"intrinsic"},
        {id:"cl4",text:"AI助手对内容的解释和说明方式让我非常难以理解",dim:"extraneous"},{id:"cl5",text:"AI助手的反馈和讲解方式对我的学习非常没有帮助",dim:"extraneous"},{id:"cl6",text:"AI助手呈现信息的方式让我很难弄清楚哪些是重点",dim:"extraneous"},
        {id:"cl7",text:"这次学习活动真正加深了我对学习主题整体内容的理解",dim:"germane"},{id:"cl8",text:"这次学习活动真正加深了我对相关知识的理解",dim:"germane"},{id:"cl9",text:"这次学习活动真正加深了我对核心概念的理解",dim:"germane"},{id:"cl10",text:"这次学习活动真正加深了我对重要知识点定义与说明的理解",dim:"germane"},
    ];
    let h=`<div class="screen active scroll-screen"><div class="card"><h2>整体学习体验评价</h2><div class="sub">请根据你的整体交互体验作答。1=完全不同意，7=完全同意</div>`;
    eaasItems.forEach(it=>{h+=`<div class="q-row"><div class="q-lbl">${it.id}. ${esc(it.text)}</div><div class="scale-r" style="gap:2px;">`;
        for(let v=1;v<=7;v++)h+=`<div class="scale-dot" style="width:32px;height:32px;font-size:0.72rem;" data-id="${it.id}" data-v="${v}" data-dim="${it.dim}" onclick="pickDot(this)">${v}</div>`;
        h+=`</div></div>`;});
    h+=`<h3 style="font-size:1rem;color:#6366f1;margin:20px 0 6px;">认知负荷评价</h3><p style="font-size:0.78rem;color:#94a3b8;margin-bottom:12px;">0=完全不符合，10=完全符合</p>`;
    clItems.forEach(it=>{h+=`<div class="q-row"><div class="q-lbl">${esc(it.text)}</div><div class="scale-r" style="gap:1px;">`;
        for(let v=0;v<=10;v++)h+=`<div class="scale-dot" style="width:26px;height:26px;font-size:0.68rem;" data-id="${it.id}" data-v="${v}" data-dim="${it.dim}" onclick="pickDot(this)">${v}</div>`;
        h+=`</div></div>`;});
    h+=`<div class="submit-zone"><button class="btn btn-p" id="btn-fin">完成</button><div class="err-msg" id="err-fin">请完成所有题目</div></div></div></div>`;
    A.innerHTML=h;
    document.getElementById("btn-fin").onclick=()=>{
        const eaasAns=[];for(const it of eaasItems){const d=document.querySelector(`.scale-dot.pick[data-id="${it.id}"]`);if(!d){document.getElementById("err-fin").style.display="block";return;}eaasAns.push({id:it.id,value:d.dataset.v,dim:it.dim});}
        const clAns=[];for(const it of clItems){const d=document.querySelector(`.scale-dot.pick[data-id="${it.id}"]`);if(!d){document.getElementById("err-fin").style.display="block";return;}clAns.push({id:it.id,value:d.dataset.v,dim:it.dim});}
        S.data.eaas=eaasAns;S.data.cognitiveLoad=clAns;
        S.data.order=ORDER;S.data.retention=S.retAnswers;S.data.transfer=S.transAnswers;
        try{_self.reportData({Q_00008:JSON.stringify(S.data)});}catch(e){console.log(e);}
        nav("post_end");
    };
}

function post_end(){
    A.innerHTML=`<div class="screen active end-page"><div style="font-size:3rem;">✅</div><h2>实验完成</h2><p>数据已自动下载。感谢你的参与！</p></div>`;
}

setTimeout(function(){nav("welcome");},50);
</script>
